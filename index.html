<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>測一測你是哪一種台灣麵？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section id="start-screen" class="screen screen-active">
      <div class="shop-sign">
        <span class="sign-small">台灣麵店人格診斷</span>
        <h1>測一測你是哪一種台灣麵？</h1>
      </div>

      <div class="wood-card intro-card">
        <div class="menu-stamp">今日限定</div>
        <p>
          走進復古麵攤，回答 10 題日常選擇。最後看看你是豪爽的汕頭麵、細膩的鹽水意麵、實用的油麵，還是有勁道的刀削麵。
        </p>
        <button id="start-btn" class="primary-btn" type="button">開始測驗</button>
      </div>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="quiz-top">
        <div id="question-count" class="question-count">第 1 / 10 題</div>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <div id="question-card" class="wood-card question-card">
        <p class="menu-number">本日第 <span id="question-number">1</span> 碗</p>
        <h2 id="question-text"></h2>
        <div id="answers" class="answers" role="group" aria-label="答案選項"></div>
      </div>
    </section>

    <section id="result-screen" class="screen">
      <div class="wood-card result-card">
        <div class="menu-header">
          <span>人格診斷菜單</span>
          <span>已出餐</span>
        </div>
        <p class="result-kicker">你是：</p>
        <h2 id="result-title"></h2>
        <div id="result-tags" class="result-tags"></div>
        <p id="result-description" class="result-description"></p>
        <blockquote id="result-line"></blockquote>
        <button id="restart-btn" class="primary-btn" type="button">重新測驗</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
